name: Validate and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 🔥 BOTÓN MANUAL

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint pytest flake8

    - name: Validate syntax
      run: |
        echo "Validating Python files..."
        python -m py_compile dags/dag_principal.py
        python -m py_compile dags/etls/etl_viales.py
        python -m py_compile dags/pipelines/scraper_viales.py

    - name: Run linting
      run: |
        echo "Running flake8..."
        flake8 dags/ --max-line-length=120 --ignore=E501,W503 || true

    - name: Test imports
      run: |
        echo "Testing imports..."
        python -c "from dags.dag_principal import dag"
        python -c "from dags.etls.etl_viales import ValesETL"
        python -c "from dags.pipelines.scraper_viales import obtener_urls_sct"
        echo "All imports OK!"

  build:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        echo "Building Docker image..."
        docker build -t airflow-cloud:latest .

    - name: Test Docker image
      run: |
        echo "Testing Docker image..."
        docker run --rm airflow-cloud:latest python --version
