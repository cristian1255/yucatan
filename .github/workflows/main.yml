name: Run Pipeline

on:
  push:
    branches: ["main"]

  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t app .

      - name: Run container
        run: docker run app
