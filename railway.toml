[build]
builder = "dockerfile"

[deploy]
startCommand = "bash ./scripts/init.sh && airflow webserver --port $PORT"

[[services]]
name = "yucatan-web"
internal_port = 8080
public_port = 8080
protocol = "http"

[[services]]
name = "yucatan-scheduler"
startCommand = "airflow scheduler"

[[services]]
name = "yucatan-worker"
startCommand = "airflow celery worker"

[env]
AIRFLOW_HOME = "/opt/airflow"
AIRFLOW__CORE__LOAD_EXAMPLES = "False"
AIRFLOW__CORE__EXECUTOR = "CeleryExecutor"
PYTHONUNBUFFERED = "1"
